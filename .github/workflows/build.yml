name: build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: make build-all

      - name: Upload Windows Binary
        uses: actions/upload-artifact@v4
        with:
          name: picoclaw_Windows_x86_64
          path: build/picoclaw-agents-windows-amd64.exe
